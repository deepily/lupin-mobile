name: lupin_mobile
description: A mobile client for the Lupin AI assistant system with voice interface and real-time communication.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Framework
  cupertino_icons: ^1.0.2

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Network and Communication
  dio: ^5.3.2
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.1

  # Audio and Media (Web compatible)
  # flutter_sound: ^9.2.13  # Disabled for web compatibility
  # audioplayers: ^5.2.1    # Disabled for web compatibility
  # permission_handler: ^11.0.1  # Disabled for web compatibility

  # Local Storage (Web compatible)
  shared_preferences: ^2.2.2
  # sqflite: ^2.3.0         # Disabled for web compatibility  
  # path_provider: ^2.1.1   # Disabled for web compatibility

  # Utilities
  get_it: ^7.6.4
  logger: ^2.0.2+1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Testing
  mockito: ^5.4.2
  bloc_test: ^9.1.4
  integration_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6

  # Code Quality
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/audio/
    - assets/images/
    - assets/fonts/

  # Fonts
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic